    商业运营是属于 ICAO 对 CAT 定义范围内的有酬活动。然而，有些与通用航空部门密切相关，并被视为通用航空部门的一部分。公共交通运营是在客户指定的地点之间飞行的非定期、按需服务，提供比航空旅行更灵活的服务。空中出租车业务为第三方提供包机服务，而商业或企业航空则使用公司拥有的飞机进行运输。
