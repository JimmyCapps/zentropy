    宣战后，达尔文开始受到军事规划者更多的关注。 1940 年 6 月，第 12 中队被“拆解”，组建了另外两个单位：澳大利亚皇家空军总部达尔文站和第 13 中队。第 12 中队保留了威拉威航班，而安森斯的两个航班则转入新中队；当月晚些时候，这些飞机被能力更强的洛克希德·哈德逊飞机所取代。伊顿被任命为该基地的首席指挥官，并于 9 月晋升为临时小组队长。
