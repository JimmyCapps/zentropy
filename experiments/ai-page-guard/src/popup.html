<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Page Guard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        width: 280px;
        background: #1a1a1a;
        color: #e8e8e8;
      }

      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        background: #111;
        border-bottom: 1px solid #2a2a2a;
      }

      header img {
        width: 20px;
        height: 20px;
      }

      header h1 {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      #status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px;
        border-bottom: 1px solid #2a2a2a;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Status dot colours mapped to content-script states */
      .dot.initializing { background: #555; }
      .dot.scanning      { background: #888; animation: pulse 1.2s infinite; }
      .dot.clean         { background: #22c55e; }
      .dot.threats_found { background: #ef4444; }
      .dot.degraded      { background: #f59e0b; }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }

      #status-label {
        font-weight: 600;
        font-size: 13px;
        flex: 1;
      }

      #info-line {
        font-size: 10px;
        color: #666;
        padding: 0 14px 8px;
        border-bottom: 1px solid #2a2a2a;
        min-height: 18px;
      }

      #threat-list {
        padding: 10px 14px;
        display: none;
      }

      #threat-list h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #888;
        margin-bottom: 8px;
      }

      .threat-item {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        margin-bottom: 8px;
        font-size: 12px;
        color: #d4d4d4;
        line-height: 1.4;
      }

      .threat-badge {
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 1px 5px;
        border-radius: 3px;
        margin-top: 1px;
      }

      .threat-badge.high   { background: #ef4444; color: #fff; }
      .threat-badge.medium { background: #f59e0b; color: #000; }
      .threat-badge.low    { background: #3b82f6; color: #fff; }

      /* Layer name badges (regex, onnx, etc.) */
      .threat-badge.regex       { background: #7c3aed; color: #fff; }
      .threat-badge.prompt_guard { background: #db2777; color: #fff; }
      .threat-badge.deberta     { background: #0891b2; color: #fff; }

      .threat-desc {
        flex: 1;
        text-transform: capitalize;
      }

      .threat-snippet {
        font-size: 10px;
        color: #888;
        font-style: italic;
        word-break: break-all;
      }

      footer {
        padding: 8px 14px;
        font-size: 10px;
        color: #555;
        border-top: 1px solid #2a2a2a;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/icon-48.png" alt="AI Page Guard" />
      <h1>AI Page Guard</h1>
    </header>

    <div id="status-row">
      <span class="dot scanning" id="status-dot"></span>
      <span id="status-label">Scanning…</span>
    </div>

    <div id="info-line"></div>

    <div id="threat-list">
      <h2>Detected Threats</h2>
      <div id="threat-items"></div>
    </div>

    <footer id="scanned-at"></footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
